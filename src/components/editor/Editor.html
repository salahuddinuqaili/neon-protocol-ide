<!-- Pro Code Editor Module -->
<div id="editor-container" class="flex-1 flex flex-col bg-background relative">
    <!-- Editor Tabs -->
    <div id="file-tabs" class="h-9 flex bg-surface border-b border-muted/30 shrink-0 overflow-x-auto z-20">
        <!-- Tabs will be dynamically generated -->
    </div>

    <div class="flex-1 flex overflow-hidden relative">
        <!-- Line Numbers -->
        <div id="line-numbers" class="w-10 bg-background border-r border-muted/10 flex flex-col pt-4 pb-4 font-mono text-[10px] text-muted text-right pr-2 select-none shrink-0">
            <!-- Numbers will be dynamically generated -->
        </div>

        <!-- Actual Code Area -->
        <div id="code-content" class="flex-1 overflow-auto p-4 font-mono text-xs leading-relaxed whitespace-pre font-medium relative text-text-main">
            <!-- Code content will be dynamically loaded -->
        </div>

        <!-- Right Panel: Agentic Copilot (Internal to Editor) -->
        <aside class="w-[240px] bg-surface border-l border-muted/30 flex flex-col shrink-0">
            <div class="h-9 flex items-center justify-between px-3 border-b border-muted/30 bg-surface-hover">
                <div class="flex items-center gap-2 text-accent-ai">
                    <span class="material-symbols-outlined text-base">smart_toy</span>
                    <span class="text-[10px] font-display font-bold tracking-widest text-text-main uppercase">Copilot</span>
                </div>
            </div>
            <div id="editor-copilot-messages" class="flex-1 overflow-y-auto p-3 flex flex-col gap-3 text-xs font-display">
                <div class="border-l-2 border-accent-ai pl-3">
                    <div class="text-[10px] text-accent-ai font-bold mb-1">Architect AI</div>
                    <div class="text-text-main leading-snug">
                        I noticed you're working on the routing logic. Would you like to implement a retry mechanism?
                    </div>
                    <button class="mt-2 px-3 py-1 bg-background border border-accent-ai/50 text-accent-ai text-[10px] font-bold hover:bg-accent-ai hover:text-background transition-colors">
                        Generate Code
                    </button>
                </div>
            </div>
            <div class="p-3 border-t border-muted/30 bg-background">
                <div class="relative flex items-center">
                    <input class="w-full bg-surface border border-muted/50 text-text-main text-xs p-2 pl-3 pr-8 focus:outline-none focus:border-accent-ai placeholder-muted" placeholder="Ask copilot..." type="text">
                    <button class="absolute right-2 text-muted hover:text-accent-ai">
                        <span class="material-symbols-outlined text-base">send</span>
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <!-- Terminal Area (Part of Editor View) -->
    <div class="h-40 bg-background border-t border-muted/30 flex flex-col shrink-0">
        <div class="h-7 flex bg-surface border-b border-muted/30 px-2">
            <div class="flex items-center px-4 border-b-2 border-primary text-text-main text-[10px] font-display font-bold uppercase tracking-wider cursor-pointer">
                Terminal
            </div>
            <div class="flex items-center px-4 text-muted hover:text-text-main text-[10px] font-display font-medium uppercase tracking-wider cursor-pointer">
                Output
            </div>
        </div>
        <div id="terminal-output" class="flex-1 overflow-auto p-3 font-mono text-[11px] text-muted">
            <div class="mb-1"><span class="text-primary">nexus@dev</span><span class="text-text-main">:</span><span class="text-blue-400">~/projects/blueprint</span>$ <span class="w-1.5 h-3 bg-primary animate-pulse ml-2 inline-block"></span></div>
        </div>
    </div>
</div>
