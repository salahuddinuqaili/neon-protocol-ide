<!-- Module Focus Explorer Module (Right Drawer) -->
<div id="module-explorer" class="absolute right-0 top-0 h-full w-[450px] bg-surface border-l border-muted flex flex-col shadow-[-10px_0_30px_rgba(0,0,0,0.5)] z-50 transform translate-x-full transition-transform duration-300 ease-in-out">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 border-b border-muted bg-background">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-surface-hover border border-primary flex items-center justify-center text-primary">
                <span class="material-symbols-outlined text-sm">router</span>
            </div>
            <div>
                <h2 id="explorer-title" class="text-sm font-bold text-text-main tracking-tight">LLM Gateway</h2>
                <div class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
                    <span class="text-[9px] text-primary font-mono uppercase tracking-widest">Active</span>
                </div>
            </div>
        </div>
        <button onclick="closeModuleExplorer()" class="text-muted hover:text-text-main p-1 transition-colors">
            <span class="material-symbols-outlined text-sm">close</span>
        </button>
    </header>

    <!-- Content -->
    <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-background/50">
        <!-- AI Insight -->
        <div class="flex gap-3 w-full">
            <div class="w-6 h-6 rounded bg-surface border border-accent-ai flex items-center justify-center text-accent-ai shrink-0 mt-1">
                <span class="material-symbols-outlined text-[14px]">smart_toy</span>
            </div>
            <div class="flex flex-col gap-1 w-full">
                <span class="text-[9px] text-muted font-mono uppercase">Architect Copilot</span>
                <div class="bg-surface-hover border-l-2 border-accent-ai p-3 text-xs text-text-main font-mono leading-relaxed">
                    I'm analyzing the <code id="explorer-node-name">LLM Gateway</code>. This component handles token-based routing between Ollama and Cloud providers.
                </div>
            </div>
        </div>

        <!-- Chat History (Placeholder) -->
        <div id="chat-history" class="space-y-4">
             <!-- Dynamically added messages -->
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-3 bg-background border-t border-muted">
        <div class="relative flex items-center">
            <input class="w-full bg-surface border border-muted text-xs font-mono p-2.5 pr-10 focus:outline-none focus:border-primary placeholder-muted" placeholder="Ask about this module..." type="text">
            <button class="absolute right-2 text-muted hover:text-primary transition-colors">
                <span class="material-symbols-outlined text-sm">send</span>
            </button>
        </div>
    </div>

    <!-- Footer CTA -->
    <div class="border-t border-muted bg-background">
        <button onclick="inspectCode()" class="w-full bg-primary hover:bg-[#0cf1f1] text-background font-bold py-4 flex items-center justify-center gap-2 transition-all group">
            <span class="material-symbols-outlined text-sm">code_blocks</span>
            <span class="tracking-wide text-xs">INSPECT CODE</span>
        </button>
    </div>
</div>
