name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build

      - name: Build Windows installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build

      - name: Build macOS installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac

      - name: Remove quarantine attributes
        run: |
          if [ -d "dist/mac-arm64" ]; then xattr -cr dist/mac-arm64/; fi
          if [ -d "dist/mac" ]; then xattr -cr dist/mac/; fi
          if [ -d "dist/mac-universal" ]; then xattr -cr dist/mac-universal/; fi

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Neon Protocol IDE ${{ github.ref_name }}"
          body: |
            ## Neon Protocol IDE ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | Windows | `Setup.exe` | Installer (recommended) |
            | Windows | `Portable.exe` | No install needed |
            | macOS Intel | `x64.dmg` or `x64.zip` | For Intel Macs |
            | macOS Apple Silicon | `arm64.dmg` or `arm64.zip` | For M1/M2/M3/M4 Macs |

            ### Windows
            1. Download the `Setup.exe` and run it
            2. If Windows warns "Unknown publisher", click **More info** then **Run anyway**

            ### macOS
            1. Download the `.zip` file for your Mac (arm64 for M1/M2/M3/M4, x64 for Intel)
            2. Extract and drag the app to Applications
            3. **Important:** Open Terminal and run:
               ```
               xattr -cr /Applications/Neon\ Protocol\ IDE.app
               ```
            4. Now open the app. If prompted, right-click the app and choose **Open**

            > The `xattr` command removes the quarantine flag that macOS adds to downloaded apps. This is needed because the app is not code-signed.
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
