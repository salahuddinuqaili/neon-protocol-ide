name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build

      - name: Build Windows installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js
        run: npm run build

      - name: Build macOS installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac

      - uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
          if-no-files-found: error

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Neon Protocol IDE ${{ github.ref_name }}"
          body: |
            ## Neon Protocol IDE ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Description |
            |----------|------|-------------|
            | Windows | `Setup.exe` | Installer (recommended) |
            | Windows | `Portable.exe` | No install needed |
            | macOS Intel | `x64.dmg` | For Intel Macs |
            | macOS Apple Silicon | `arm64.dmg` | For M1/M2/M3/M4 Macs |

            ### First time?
            1. Download the file for your platform
            2. Run the installer (Windows) or drag to Applications (macOS)
            3. Open the app and click **I'm New to Coding** to start the guided tour

            > The app is not code-signed. Windows: click "More info" then "Run anyway". macOS: right-click then "Open".
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
